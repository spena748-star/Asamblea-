<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Programa Asamblea 2026</title>
    
    <link rel="manifest" href="manifest.json">
    
    <style>
        :root {
            --bg: #0f172a;
            --card: #1e293b;
            --accent: #38bdf8;
            --text: #f8fafc;
            --text-muted: #94a3b8;
        }

        body.theme-amoled {
            --bg: #000000;
            --card: #121212;
            --accent: #a855f7;
            --text: #ffffff;
            --text-muted: #71717a;
        }

        body.theme-cyberpunk {
            --bg: #1a0b2e;
            --card: #2c124d;
            --accent: #f43f5e;
            --text: #ccff00;
            --text-muted: #a855f7;
        }

        body.theme-forest {
            --bg: #0f1711;
            --card: #1c2b1f;
            --accent: #4ade80;
            --text: #f0fdf4;
            --text-muted: #74a17c;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: system-ui, -apple-system, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            min-height: 100vh;
            padding: 16px;
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: all 0.3s ease;
        }

        header {
            width: 100%;
            max-width: 500px;
            margin-bottom: 20px;
            text-align: center;
        }

        header h1 {
            font-size: 1.4rem;
            color: var(--accent);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        header p {
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-top: 4px;
        }

        .tabs-container {
            width: 100%;
            max-width: 500px;
            display: flex;
            gap: 8px;
            margin-bottom: 16px;
        }

        .tab {
            flex: 1;
            background-color: var(--card);
            color: var(--text-muted);
            border: 1px solid rgba(255,255,255,0.05);
            padding: 12px 8px;
            border-radius: 12px;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            text-align: center;
        }

        .tab.active {
            background-color: var(--accent);
            color: #000;
        }

        main {
            width: 100%;
            max-width: 500px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .card {
            background-color: var(--card);
            border-radius: 16px;
            padding: 16px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .card h2 {
            font-size: 1.1rem;
            margin-bottom: 12px;
            color: var(--accent);
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding-bottom: 6px;
        }

        .program-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 8px;
        }

        .program-item {
            display: flex;
            gap: 12px;
            font-size: 0.9rem;
            line-height: 1.4;
        }

        .program-time {
            font-weight: 700;
            color: var(--accent);
            min-width: 45px;
        }

        textarea {
            width: 100%;
            height: 160px;
            background-color: rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            color: var(--text);
            padding: 12px;
            font-size: 1rem;
            resize: none;
            outline: none;
            font-family: inherit;
        }

        .status {
            text-align: right;
            font-size: 0.75rem;
            color: var(--text-muted);
            margin-top: 6px;
            margin-bottom: 12px;
        }

        /* Botones de acción y descarga */
        .action-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .btn-download {
            padding: 12px;
            border-radius: 12px;
            font-size: 0.85rem;
            font-weight: 700;
            cursor: pointer;
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }

        .btn-sheets {
            background-color: #107c41;
            color: white;
        }

        .btn-text {
            background-color: #475569;
            color: white;
        }

        .theme-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
            margin-top: 8px;
        }

        .theme-btn {
            padding: 8px 4px;
            font-size: 0.75rem;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            background: #334155;
            color: #fff;
            font-weight: bold;
        }

        .btn-clear {
            background-color: rgba(239, 68, 68, 0.15);
            color: #f87171;
            border: 1px solid #ef4444;
            padding: 10px;
            border-radius: 12px;
            width: 100%;
            font-weight: bold;
            cursor: pointer;
            margin-top: 12px;
            font-size: 0.85rem;
        }
    </style>
</head>
<body>

    <header>
        <h1>Felices para siempre</h1>
        <p>Asamblea 2026 • Programa Personal</p>
    </header>

    <div class="tabs-container">
        <div class="tab active" onclick="switchDay('viernes')">Viernes</div>
        <div class="tab" onclick="switchDay('sabado')">Sábado</div>
        <div class="tab" onclick="switchDay('domingo')">Domingo</div>
    </div>

    <main>
        <div class="card">
            <h2 id="dayTitle">Viernes</h2>
            <div class="program-list" id="programSchedule"></div>
        </div>

        <!-- Bloque de Notas Privadas y Descargas -->
        <div class="card">
            <h2 id="notesTitle">📝 Mis Notas (Viernes)</h2>
            <textarea id="editor" placeholder="Escribe tus apuntes o textos de hoy aquí..."></textarea>
            <div class="status" id="saveStatus">Guardado automáticamente en tu Pixel</div>
            
            <!-- Nuevas opciones de descarga -->
            <div class="action-grid">
                <button class="btn-download btn-sheets" onclick="downloadAsSheets()">📊 Google Sheets</button>
                <button class="btn-download btn-text" onclick="downloadAsTXT()">📄 Archivo Notas</button>
            </div>

            <button class="btn-clear" onclick="clearCurrentNotes(false)">🗑️ Borrar notas sin descargar</button>
        </div>

        <div class="card">
            <p style="font-size: 0.85rem; color: var(--text-muted); margin-bottom: 8px;">Tema de Pantalla:</p>
            <div class="theme-grid">
                <button class="theme-btn" style="background:#0f172a;" onclick="setTheme('slate')">Slate</button>
                <button class="theme-btn" style="background:#000000; color:#a855f7;" onclick="setTheme('amoled')">OLED</button>
                <button class="theme-btn" style="background:#1a0b2e; color:#ccff00;" onclick="setTheme('cyber')">Cyber</button>
                <button class="theme-btn" style="background:#0f1711; color:#4ade80;" onclick="setTheme('forest')">Forest</button>
            </div>
        </div>
    </main>

    <script>
        const programData = {
            viernes: {
                title: 'Viernes: "Felices los que reconocen sus necesidades espirituales" (Mat. 5:3)',
                schedule: [
                    { time: '9:20', desc: 'Video musical' },
                    { time: '9:30', desc: 'Canción 160 y oración' },
                    { time: '9:40', desc: 'DISCURSO DEL PRESIDENTE: ¿Es realista la idea de ser felices para siempre? (Sal. 16:11)' },
                    { time: '10:10', desc: 'PRODUCCIÓN AUDIOVISUAL: Las buenas noticias según Jesús: Episodio 4 "Para eso he venido"' },
                    { time: '11:05', desc: 'Canción 17 y anuncios' },
                    { time: '11:15', desc: 'SERIE DE DISCURSOS: ¡Las profecías sobre el Mesías se cumplieron!' },
                    { time: '12:10', desc: 'Canción 14 e intermedio' },
                    { time: '1:35', desc: 'Video musical' },
                    { time: '1:45', desc: 'Canción 23' },
                    { time: '1:50', desc: '¿Qué enseñó Jesús sobre el sábado? (Mat. 12:1-14)' },
                    { time: '2:10', desc: 'SERIE DE DISCURSOS: Imitemos a los que sirvieron a Jesús' },
                    { time: '2:50', desc: 'Canción 76 y anuncios' },
                    { time: '3:00', desc: '"Felices los que lavan sus túnicas largas" (Apoc. 7:9, 10)' },
                    { time: '3:30', desc: 'Canción 155 y oración de conclusión' }
                ]
            },
            sabado: {
                title: 'Sábado: "Hay más felicidad en dar que en recibir" (Hech. 20:35)',
                schedule: [
                    { time: '9:20', desc: 'Video musical' },
                    { time: '9:30', desc: 'Canción 111 y oración' },
                    { time: '9:40', desc: '"Él tomó la palabra y se puso a enseñarles" (Mat. 5:1, 2)' },
                    { time: '9:50', desc: 'PRODUCCIÓN AUDIOVISUAL: Episodio 5 - Impactados con su manera de enseñar' },
                    { time: '10:25', desc: 'Canción 89 y anuncios' },
                    { time: '10:35', desc: 'Cuatro enemigos de la felicidad (Luc. 6:24-26)' },
                    { time: '10:50', desc: '¿Puede ver el principio detrás de la ley? (Mat. 5:17-48)' },
                    { time: '11:15', desc: 'SERIE DE DISCURSOS: Lecciones sobre la tierra en la que vivió Jesús' },
                    { time: '11:40', desc: 'DISCURSO DE BAUTISMO: "Tu Padre, que mira en secreto, te lo pagará"' },
                    { time: '12:10', desc: 'Canción 51 e intermedio' },
                    { time: '1:35', desc: 'Video musical' },
                    { time: '1:45', desc: 'Canción 125' },
                    { time: '1:50', desc: 'SERIE DE DISCURSOS: Felices... (Mateo 5:3-12)' },
                    { time: '3:20', desc: 'Canción 81 y anuncios' },
                    { time: '3:30', desc: '¿Por qué se angustian? (Mat. 6:19-33)' },
                    { time: '3:55', desc: '"Entren por la puerta angosta" (Mat. 7:1-5, 12-14)' },
                    { time: '4:30', desc: 'Canción 21 y oración de conclusión' }
                ]
            },
            domingo: {
                title: 'Domingo: "Felices los ojos de ustedes, que ven, y sus oídos, que oyen" (Mat. 13:16)',
                schedule: [
                    { time: '9:20', desc: 'Video musical' },
                    { time: '9:30', desc: 'Canción 68 y oración' },
                    { time: '9:40', desc: 'SERIE DE DISCURSOS: Lecciones de las comparaciones' },
                    { time: '11:00', desc: 'Canción 64 y anuncios' },
                    { time: '11:10', desc: 'DISCURSO PÚBLICO: ¿Ha encontrado el tesoro? (Mat. 13:44-46)' },
                    { time: '11:40', desc: 'Resumen de La Atalaya' },
                    { time: '12:10', desc: 'Canción 140 e intermedio' },
                    { time: '1:35', desc: 'Video musical' },
                    { time: '1:45', desc: 'Canción 108' },
                    { time: '1:50', desc: 'PRODUCCIÓN AUDIOVISUAL: Episodio 6 - "¿Eres tú el que tiene que venir?"' },
                    { time: '2:35', desc: 'Canción 120 y anuncios' },
                    { time: '2:45', desc: '¿Qué hemos aprendido? "Felices los ojos de ustedes..."' },
                    { time: '3:55', desc: 'Canción 163 y oración de conclusión' }
                ]
            }
        };

        const editor = document.getElementById('editor');
        const status = document.getElementById('saveStatus');
        const dayTitle = document.getElementById('dayTitle');
        const notesTitle = document.getElementById('notesTitle');
        const programSchedule = document.getElementById('programSchedule');
        
        let currentDay = 'viernes';

        function renderSchedule(day) {
            programSchedule.innerHTML = '';
            programData[day].schedule.forEach(item => {
                const div = document.createElement('div');
                div.className = 'program-item';
                div.innerHTML = `<span class="program-time">${item.time}</span><span class="program-desc">${item.desc}</span>`;
                programSchedule.appendChild(div);
            });
        }

        function switchDay(day) {
            localStorage.setItem(`assembly_notes_2026_${currentDay}`, editor.value);
            currentDay = day;
            
            document.querySelectorAll('.tab').forEach((tab, index) => {
                const days = ['viernes', 'sabado', 'domingo'];
                tab.classList.toggle('active', days[index] === day);
            });

            dayTitle.textContent = day.charAt(0).toUpperCase() + day.slice(1);
            notesTitle.textContent = `📝 Mis Notas (${day.charAt(0).toUpperCase() + day.slice(1)})`;
            renderSchedule(day);
            editor.value = localStorage.getItem(`assembly_notes_2026_${day}`) || '';
            status.textContent = "Día seleccionado";
        }

        editor.addEventListener('input', () => {
            localStorage.setItem(`assembly_notes_2026_${currentDay}`, editor.value);
            status.textContent = "Guardando...";
            setTimeout(() => { status.textContent = "Guardado automáticamente en tu Pixel"; }, 400);
        });

        // Función centralizada para borrar
        function clearCurrentNotes(silent = false) {
            if (silent || confirm(`¿Quieres borrar por completo las notas guardadas de hoy (${currentDay})?`)) {
                editor.value = '';
                localStorage.removeItem(`assembly_notes_2026_${currentDay}`);
                status.textContent = "Notas eliminadas de la app";
            }
        }

        // --- SISTEMA DE DESCARGAS AUTOMATIZADO ---
        
        function postDownloadFlow() {
            // Pregunta inmediatamente después de descargar si desea vaciar el editor
            setTimeout(() => {
                if (confirm("¡Descarga completada con éxito! ¿Deseas borrar las notas guardadas en la app ahora para limpiar el editor?")) {
                    clearCurrentNotes(true);
                }
            }, 500);
        }

        function downloadAsSheets() {
            const content = editor.value.trim();
            if (!content) return alert("No hay notas escritas para exportar.");

            // Crear formato CSV estructurado para Hojas de Cálculo
            let csvContent = "data:text/csv;charset=utf-8,\uFEFF"; // \uFEFF fuerza soporte de acentos en Excel/Sheets
            csvContent += "Día,Notas Generales\n";
            
            // Limpiar saltos de línea conflictivos dentro de las celdas de Sheets
            const cleanContent = content.replace(/"/g, '""');
            csvContent += `"${currentDay.toUpperCase()}","${cleanContent}"\n`;

            const encodedUri = encodeURI(csvContent);
            const link = document.createElement("a");
            link.setAttribute("href", encodedUri);
            link.setAttribute("download", `Asamblea_2026_Notas_${currentDay}.csv`);
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);

            postDownloadFlow();
        }

        function downloadAsTXT() {
            const content = editor.value.trim();
            if (!content) return alert("No hay notas escritas para exportar.");

            // Formato de texto estructurado
            const fullText = `ASAMBLEA 2026: FELICES PARA SIEMPRE\nNOTAS DEL DÍA: ${currentDay.toUpperCase()}\n=====================================\n\n${content}`;
            
            const blob = new Blob([fullText], { type: "text/plain;charset=utf-8" });
            const link = document.createElement("a");
            link.href = URL.createObjectURL(blob);
            link.download = `Notas_Asamblea_2026_${currentDay}.txt`;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);

            postDownloadFlow();
        }

        function setTheme(theme) {
            document.body.className = '';
            if (theme === 'amoled') document.body.classList.add('theme-amoled');
            if (theme === 'cyber') document.body.classList.add('theme-cyberpunk');
            if (theme === 'forest') document.body.classList.add('theme-forest');
            localStorage.setItem('assembly_theme_choice', theme);
        }

        window.addEventListener('DOMContentLoaded', () => {
            setTheme(localStorage.getItem('assembly_theme_choice') || 'slate');
            renderSchedule('viernes');
            editor.value = localStorage.getItem('assembly_notes_2026_viernes') || '';
        });
    </script>
</body>
</html>
