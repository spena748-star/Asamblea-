<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Notas</title>
    <style>
        body {
            margin: 0;
            background: #121212; /* Fondo oscuro nativo para pantalla OLED */
            font-family: system-ui, sans-serif;
            padding: 15px;
        }
        textarea {
            width: 100%;
            height: 85vh;
            background: transparent;
            border: none;
            color: #e3e3e3;
            font-size: 18px;
            line-height: 1.5;
            resize: none;
            outline: none;
            padding: 0;
        }
        .status {
            color: #5f6368;
            font-size: 12px;
            text-align: right;
            margin-top: 10px;
        }
    </style>
</head>
<body>

    <textarea id="box" placeholder="Escribe aquí... Todo se guarda en tu Pixel."></textarea>
    <div class="status" id="indicator">Listo</div>

    <script>
        const box = document.getElementById('box');
        const ind = document.getElementById('indicator');

        // Carga lo guardado al abrir
        box.value = localStorage.getItem('mi_nota_secreta') || '';

        // Guarda al instante con cada letra que escribes
        box.addEventListener('input', () => {
            localStorage.setItem('mi_nota_secreta', box.value);
            ind.textContent = "Guardado";
            setTimeout(() => { ind.textContent = "Listo"; }, 800);
        });
    </script>

</body>
</html>
